<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>粒子手势引擎</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#06060f;overflow:hidden;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;color:#fff}
    #c{display:block;position:fixed;top:0;left:0}
    #video{position:fixed;width:1px;height:1px;opacity:0;pointer-events:none}

    #skel{
      position:fixed;bottom:24px;right:24px;width:160px;height:120px;
      border-radius:12px;border:1.5px solid rgba(120,160,255,.25);
      background:rgba(6,6,20,.7);backdrop-filter:blur(8px);
      z-index:20;opacity:0;transition:opacity .5s;
      transform:scaleX(-1);
    }
    #skel.on{opacity:1}

    /* (gesture hud removed) */

    .shapes{
      position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:20;
      display:flex;flex-direction:row;gap:10px;
    }
    .shapes button{
      width:48px;height:48px;border-radius:12px;border:1.5px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);
      font-size:18px;cursor:pointer;transition:all .3s;backdrop-filter:blur(6px);
      display:flex;align-items:center;justify-content:center;position:relative;
    }
    .shapes button:hover{background:rgba(255,255,255,.08);color:#fff}
    .shapes button.on{
      border-color:rgba(120,170,255,.6);color:#fff;
      background:rgba(120,170,255,.12);box-shadow:0 0 16px rgba(120,170,255,.15);
    }
    .shapes button .tt{
      position:absolute;bottom:56px;left:50%;transform:translateX(-50%);
      font-size:11px;color:rgba(255,255,255,.45);
      white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;letter-spacing:.5px;
    }
    .shapes button:hover .tt{opacity:1}

    /* (modes removed — gesture auto-switches) */

    #stat{
      position:fixed;top:18px;right:22px;z-index:20;
      font-size:11px;color:rgba(255,255,255,.25);pointer-events:none;text-align:right;
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="skel"></canvas>
<canvas id="c"></canvas>

<div class="shapes" id="shapeBar">
  <button class="on" data-s="nebula">☁<span class="tt">星云</span></button>
  <button data-s="helix">𝌆<span class="tt">螺旋</span></button>
  <button data-s="sphere">◉<span class="tt">星球</span></button>
  <button data-s="wave">〰<span class="tt">波浪</span></button>
  <button data-s="ring">◎<span class="tt">光环</span></button>
  <button data-s="scatter">✺<span class="tt">散射</span></button>
  <button data-s="heart">♥<span class="tt">红心</span></button>
  <button data-s="text" id="textBtn">Aa<span class="tt">文字</span></button>
</div>

<div id="textInput" style="
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:30;
  display:none;flex-direction:row;gap:8px;align-items:center;
">
  <input id="textField" type="text" placeholder="输入文字..." maxlength="8" style="
    width:180px;padding:10px 16px;border-radius:12px;
    border:1.5px solid rgba(120,170,255,.4);
    background:rgba(10,10,30,.85);backdrop-filter:blur(8px);
    color:#fff;font-size:15px;font-family:inherit;
    outline:none;letter-spacing:1px;
  "/>
  <button id="textGo" style="
    padding:10px 18px;border-radius:12px;
    border:1.5px solid rgba(120,170,255,.5);
    background:rgba(120,170,255,.15);
    color:#fff;font-size:13px;cursor:pointer;
    font-family:inherit;backdrop-filter:blur(6px);
  ">确定</button>
</div>

<canvas id="textCanvas" style="display:none"></canvas>

<div id="stat"></div>

<script type="module">
/* ══════ CDN → LOCAL FALLBACK ══════ */
let cdnOK = true;

function loadScript(cdn, local){
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = cdn;
    s.onload = resolve;
    s.onerror = () => {
      cdnOK = false;
      s.remove();
      const s2 = document.createElement('script');
      s2.src = local;
      s2.onload = resolve;
      s2.onerror = () => reject(new Error('Failed: ' + local));
      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  });
}

let mpAvailable = true;
try {
  await loadScript(
    'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js',
    './libs/hands.min.js'
  );
  await loadScript(
    'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js',
    './libs/camera_utils.min.js'
  );
} catch { mpAvailable = false; }

let THREE;
try {
  THREE = await import('https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js');
} catch {
  cdnOK = false;
  THREE = await import('./libs/three.module.js');
}

/* ══════ DOM ══════ */
const canvas  = document.getElementById('c');
const video   = document.getElementById('video');
const skelCv  = document.getElementById('skel');
const skCtx   = skelCv.getContext('2d');
const statEl  = document.getElementById('stat');
const W = () => innerWidth, H = () => innerHeight;

/* ══════ THREE SETUP ══════ */
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
const cam3d = new THREE.PerspectiveCamera(55, W()/H(), 0.1, 80);
cam3d.position.set(0, 0.5, 6);
cam3d.lookAt(0, 0, 0);
scene.add(new THREE.AmbientLight(0x222244, 0.4));

/* ══════ BLOOM POST-PROCESSING ══════ */
let composer = null;
try {
  const { EffectComposer } = await import('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js');
  const { RenderPass } = await import('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/RenderPass.js');
  const { UnrealBloomPass } = await import('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js');
  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, cam3d));
  composer.addPass(new UnrealBloomPass(new THREE.Vector2(W(), H()), 0.8, 0.4, 0.2));
} catch(e) { console.warn('Bloom unavailable:', e.message); }

/* ══════ GLOW TEXTURE ══════ */
function makeGlow(sz=256){
  const cv=document.createElement('canvas'); cv.width=cv.height=sz;
  const x=cv.getContext('2d');
  const g=x.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.03,'rgba(255,255,255,0.97)');
  g.addColorStop(0.08,'rgba(255,255,255,0.85)');
  g.addColorStop(0.15,'rgba(255,255,255,0.6)');
  g.addColorStop(0.3,'rgba(255,255,255,0.2)');
  g.addColorStop(0.5,'rgba(255,255,255,0.05)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g; x.fillRect(0,0,sz,sz);
  return new THREE.CanvasTexture(cv);
}
const glowTex = makeGlow();

/* ══════ STAR FIELD ══════ */
const STAR_N=1200;
const stGeo=new THREE.BufferGeometry();
const stPos=new Float32Array(STAR_N*3), stCol=new Float32Array(STAR_N*3);
for(let i=0;i<STAR_N;i++){
  const r=10+Math.random()*25, th=Math.random()*Math.PI*2, ph=(Math.random()-.5)*Math.PI;
  stPos[i*3]=Math.cos(th)*Math.cos(ph)*r; stPos[i*3+1]=Math.sin(ph)*r; stPos[i*3+2]=Math.sin(th)*Math.cos(ph)*r;
  const c=new THREE.Color().setHSL(.55+Math.random()*.2,.5,.4+Math.random()*.5);
  stCol[i*3]=c.r; stCol[i*3+1]=c.g; stCol[i*3+2]=c.b;
}
stGeo.setAttribute('position',new THREE.BufferAttribute(stPos,3));
stGeo.setAttribute('color',new THREE.BufferAttribute(stCol,3));
const starMesh=new THREE.Points(stGeo,new THREE.PointsMaterial({
  size:.03,map:glowTex,vertexColors:true,
  blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.5
}));
scene.add(starMesh);

/* ══════ MAIN PARTICLES ══════ */
const MAX=5000;
const P=[];
const geo=new THREE.BufferGeometry();
const posA=new Float32Array(MAX*3);
const colA=new Float32Array(MAX*3);
const sizA=new Float32Array(MAX);
geo.setAttribute('position',new THREE.BufferAttribute(posA,3));
geo.setAttribute('color',new THREE.BufferAttribute(colA,3));
geo.setAttribute('size',new THREE.BufferAttribute(sizA,1));
const pMat=new THREE.PointsMaterial({
  size:.18,map:glowTex,vertexColors:true,
  blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.9,
});
const pMesh=new THREE.Points(geo,pMat);
scene.add(pMesh);

for(let i=0;i<MAX;i++){
  const r=2+Math.random()*3, th=Math.random()*Math.PI*2, ph=(Math.random()-.5)*Math.PI;
  P.push({
    x:Math.cos(th)*Math.cos(ph)*r, y:Math.sin(ph)*r, z:Math.sin(th)*Math.cos(ph)*r,
    vx:0,vy:0,vz:0, tx:0,ty:0,tz:0,
    color:new THREE.Color().setHSL(Math.random(),.8,.5+Math.random()*.4),
    size:.04+Math.random()*.1
  });
}

/* ══════ SHAPE GENERATORS ══════ */
let curShape='nebula';

function shapeNebula(i,n){
  const arms=3,arm=i%arms,ba=(arm/arms)*Math.PI*2;
  const t=i/n,r=.3+t*3.2,a=ba+t*Math.PI*2.5;
  const sc=(1-t)*.7+.15;
  return{x:Math.cos(a)*r+(Math.random()-.5)*sc,y:(Math.random()-.5)*sc*1.8*(1-t*.6),z:Math.sin(a)*r+(Math.random()-.5)*sc};
}
function shapeHelix(i,n){
  const t=(i/n)*Math.PI*2*6,h=(i/n-.5)*5;
  const strand=i%2,a=t+(strand?Math.PI:0),j=.06;
  return{x:Math.cos(a)*1.4+(Math.random()-.5)*j,y:h+(Math.random()-.5)*j,z:Math.sin(a)*1.4+(Math.random()-.5)*j};
}
function shapeSphere(i,n){
  const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
  const r=1.8*(.85+Math.random()*.15);
  return{x:r*Math.sin(ph)*Math.cos(th),y:r*Math.sin(ph)*Math.sin(th),z:r*Math.cos(ph)};
}
function shapeWave(i,n){
  const cols=80,row=Math.floor(i/cols),col=i%cols;
  const x=(col/cols-.5)*6,z=(row/(n/cols)-.5)*6;
  const y=Math.sin(x*1.8)*Math.cos(z*1.8)*.8;
  return{x:x+(Math.random()-.5)*.06,y,z:z+(Math.random()-.5)*.06};
}
function shapeRing(i,n){
  if(i<n*.55){
    const a=Math.random()*Math.PI*2,R=2+Math.random()*.4;
    return{x:Math.cos(a)*R,y:(Math.random()-.5)*.08,z:Math.sin(a)*R};
  }
  const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=.9;
  return{x:r*Math.sin(ph)*Math.cos(th),y:r*Math.sin(ph)*Math.sin(th),z:r*Math.cos(ph)};
}
function shapeScatter(i,n){
  const r=1+Math.random()*4.5,th=Math.random()*Math.PI*2,ph=(Math.random()-.5)*Math.PI;
  return{x:Math.cos(th)*Math.cos(ph)*r,y:Math.sin(ph)*r,z:Math.sin(th)*Math.cos(ph)*r};
}
function shapeHeart(i,n){
  // 3D solid heart: take 2D heart outline, give it thickness via a sphere-like cross section
  const t = Math.random() * Math.PI * 2;
  const bx = 16 * Math.pow(Math.sin(t), 3);
  const by = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
  // Scale from boundary toward center for interior fill
  const r = 0.15 + Math.sqrt(Math.random()) * 0.85;
  const fx = bx * r;
  const fy = by * r;
  // 3D depth: at each (fx,fy), the heart has thickness proportional to how deep inside the boundary
  // Compute how far inside: distance from (fx,fy) to boundary along same ray
  const edgeDist = 1.0 - r; // 0 at edge, ~0.85 at center
  const maxDepth = edgeDist * 12; // max Z extent at this point
  // Spherical cross-section in Z
  const zAngle = Math.random() * Math.PI * 2;
  const zr = Math.sqrt(Math.random());
  const fz = Math.cos(zAngle) * zr * maxDepth;
  const scale = 0.09;
  return{x: fx * scale, y: fy * scale, z: fz * scale};
}

const shapeFns={nebula:shapeNebula,helix:shapeHelix,sphere:shapeSphere,wave:shapeWave,ring:shapeRing,scatter:shapeScatter,heart:shapeHeart,text:shapeText};
const shapeHues={nebula:.58,helix:.75,sphere:.52,wave:.42,ring:.62,scatter:0,heart:0,text:.55};

/* ══════ TEXT SHAPE ══════ */
let textPixels = []; // [{x,y}] normalized positions from text render

function renderTextToPixels(str){
  const tc = document.getElementById('textCanvas');
  const ctx = tc.getContext('2d');
  const fontSize = 200;
  const fontStr = `bold ${fontSize}px "PingFang SC","Microsoft YaHei","Hiragino Sans","Noto Sans SC",sans-serif`;
  ctx.font = fontStr;
  const m = ctx.measureText(str);
  // Use actual bounding box for precise CJK sizing
  const ascent = m.actualBoundingBoxAscent || fontSize;
  const descent = m.actualBoundingBoxDescent || fontSize * 0.2;
  const textW = m.width;
  const textH = ascent + descent;
  const pad = fontSize * 0.3;
  const w = Math.ceil(textW) + pad * 2;
  const h = Math.ceil(textH) + pad * 2;
  tc.width = w; tc.height = h;
  ctx.font = fontStr;
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'center';
  ctx.fillText(str, w/2, pad + ascent);
  const data = ctx.getImageData(0, 0, w, h).data;
  const pts = [];
  const maxDim = Math.max(textW, textH);
  const step = Math.max(2, Math.ceil(Math.sqrt(w * h / P.length / 2)));
  for(let y=0; y<h; y+=step){
    for(let x=0; x<w; x+=step){
      if(data[(y*w+x)*4+3] > 80){
        pts.push({
          x: (x - w/2) / maxDim * 2,
          y: -(y - h/2) / maxDim * 2
        });
      }
    }
  }
  textPixels = pts;
}

function shapeText(i, n){
  if(textPixels.length === 0) return {x:0, y:0, z:0};
  const p = textPixels[i % textPixels.length];
  const scale = 3.5;
  const jitter = 0.02;
  return {
    x: p.x * scale + (Math.random()-0.5) * jitter,
    y: p.y * scale + (Math.random()-0.5) * jitter,
    z: (Math.random()-0.5) * 0.15
  };
}

function assignTargets(){
  const fn=shapeFns[curShape], bh=shapeHues[curShape];
  for(let i=0;i<P.length;i++){
    const t=fn(i,P.length);
    P[i].tx=t.x; P[i].ty=t.y; P[i].tz=t.z;
    if(curShape==='scatter') P[i].color.setHSL(Math.random(),.85,.45+Math.random()*.45);
    else if(curShape==='heart'){
      const d = Math.sqrt(t.x*t.x + t.y*t.y) / 1.5;
      const hue = 0.96 + d * 0.02;
      const sat = 0.65 + d * 0.3;
      const lit = 0.75 - d * 0.35;
      P[i].color.setHSL(hue % 1, sat, Math.max(0.35, lit));
    }
    else if(curShape==='text'){
      // Golden-cyan gradient based on position
      const tx = (t.x + 2.5) / 5; // normalize 0-1
      P[i].color.setHSL(0.5 + tx * 0.12, 0.8, 0.5 + Math.random() * 0.3);
    }
    else P[i].color.setHSL((bh+(i/P.length)*.12+Math.random()*.04)%1,.85,.45+Math.random()*.45);
  }
}
assignTargets();

/* ══════ SHAPE BUTTONS ══════ */
const textInputDiv = document.getElementById('textInput');
const textField = document.getElementById('textField');

document.getElementById('shapeBar').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  const shape = b.dataset.s;
  document.querySelectorAll('.shapes button').forEach(x=>x.classList.toggle('on',x===b));

  if(shape==='text'){
    // Show text input, don't switch shape yet
    textInputDiv.style.display='flex';
    textField.focus();
  } else {
    textInputDiv.style.display='none';
    curShape=shape;
    assignTargets();
  }
});

function applyText(){
  const str = textField.value.trim();
  if(!str) return;
  renderTextToPixels(str);
  curShape='text';
  assignTargets();
  textInputDiv.style.display='none';
}

document.getElementById('textGo').addEventListener('click', applyText);
textField.addEventListener('keydown',e=>{
  if(e.key==='Enter') applyText();
  e.stopPropagation(); // prevent shape keyboard shortcuts while typing
});

window.addEventListener('keydown',e=>{
  // Don't trigger shortcuts when typing in text field
  if(document.activeElement === textField) return;
  const map={'1':'nebula','2':'helix','3':'sphere','4':'wave','5':'ring','6':'scatter','7':'heart','8':'text'};
  if(map[e.key]){
    if(e.key==='8'){
      textInputDiv.style.display='flex'; textField.focus();
    } else {
      textInputDiv.style.display='none';
      curShape=map[e.key];assignTargets();
    }
    document.querySelectorAll('.shapes button').forEach(x=>x.classList.toggle('on',x.dataset.s===map[e.key]));
  }
});

/* ══════ CAMERA ORBIT (mouse/touch) ══════ */
let rotY=0,rotX=.25,tRotY=0,tRotX=.25,zoom=6,tZoom=6;
let mDown=false,mPX=0,mPY=0;
let attractor=new THREE.Vector3(), aMode='none';

function setAtt(cx,cy){attractor.set((cx/W())*8-4,-(cy/H())*8+4,0);}

canvas.addEventListener('mousedown',e=>{mDown=true;mPX=e.clientX;mPY=e.clientY;aMode='attract';setAtt(e.clientX,e.clientY);});
window.addEventListener('mouseup',()=>{mDown=false;aMode='none';});
window.addEventListener('mousemove',e=>{
  if(!mDown)return;
  const dx=e.clientX-mPX,dy=e.clientY-mPY;
  if(aMode!=='attract'||Math.abs(dx)>3||Math.abs(dy)>3){
    const rotLimit = curShape==='text' ? 0.3 : 1.2;
    tRotY+=dx*.015;tRotX+=dy*.015;tRotX=Math.max(-rotLimit,Math.min(rotLimit,tRotX));
    if(curShape==='text') tRotY=Math.max(-Math.PI/2,Math.min(Math.PI/2,tRotY));
    mPX=e.clientX;mPY=e.clientY;aMode='none';
  }
  if(aMode==='attract'&&mDown)setAtt(e.clientX,e.clientY);
});
canvas.addEventListener('wheel',e=>{
  targetScale = Math.max(0.4, Math.min(2.0, targetScale - e.deltaY * 0.001));
});

canvas.addEventListener('touchstart',e=>{mDown=true;aMode='attract';mPX=e.touches[0].clientX;mPY=e.touches[0].clientY;setAtt(mPX,mPY);},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const dx=e.touches[0].clientX-mPX,dy=e.touches[0].clientY-mPY;
  if(aMode==='attract'&&Math.abs(dx)<2&&Math.abs(dy)<2){setAtt(e.touches[0].clientX,e.touches[0].clientY);}
  else{const rotLimit=curShape==='text'?0.3:1.2;tRotY+=dx*.015;tRotX+=dy*.015;tRotX=Math.max(-rotLimit,Math.min(rotLimit,tRotX));if(curShape==='text') tRotY=Math.max(-Math.PI/2,Math.min(Math.PI/2,tRotY));aMode='none';}
  mPX=e.touches[0].clientX;mPY=e.touches[0].clientY;
},{passive:false});
canvas.addEventListener('touchend',()=>{mDown=false;aMode='none';});

/* ══════════════════════════════════════════
   MEDIAPIPE — old stable @mediapipe/hands
   Callback-driven via Camera util = every
   frame auto-sent, no manual throttle needed
   ══════════════════════════════════════════ */
let handLM = null;
let mpReady = false;
let gestureCandidate = 'none';
let targetScale = 1.0;
let curScale = 1.0;
let heartbeatBase = 1.0;
let lastExt = 0;
let gestureCandidateCount = 0;
let prevMode = 'none';

const SKEL_CONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];

function isPinch(lm){
  return Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y) < 0.08;
}

function countOpen(lm){
  const w=lm[0]; let c=0;
  // Four fingers: compare tip-to-wrist vs pip-to-wrist distance
  for(const[tip,pip]of[[8,6],[12,10],[16,14],[20,18]]){
    const tipDist = Math.hypot(lm[tip].x-w.x,lm[tip].y-w.y);
    const pipDist = Math.hypot(lm[pip].x-w.x,lm[pip].y-w.y);
    if(tipDist > pipDist * 1.15) c++;
  }
  return c;
}

// Unproject hand 2D coords to 3D world via camera ray → camera-facing plane
const _ray = new THREE.Raycaster();
const _ndc = new THREE.Vector2();
const _plane = new THREE.Plane();
const _hit = new THREE.Vector3();
const _camDir = new THREE.Vector3();

function ndc2world(nx, ny){
  const mx = 1 - nx; // mirror X for selfie view
  _ndc.set(mx * 2 - 1, -(ny * 2 - 1)); // convert to clip space [-1,1]
  // Build a plane facing the camera, passing through the origin
  cam3d.getWorldDirection(_camDir);
  _plane.setFromNormalAndCoplanarPoint(_camDir, new THREE.Vector3(0,0,0));
  _ray.setFromCamera(_ndc, cam3d);
  if(_ray.ray.intersectPlane(_plane, _hit)){
    return _hit.clone();
  }
  // fallback: just project forward a fixed distance
  _ray.setFromCamera(_ndc, cam3d);
  return _ray.ray.at(zoom, new THREE.Vector3());
}

function onHandResults(results){
  if(results.multiHandLandmarks && results.multiHandLandmarks.length > 0){
    const lm = results.multiHandLandmarks[0];
    handLM = lm;

    const pinch = isPinch(lm);
    const ext = countOpen(lm);
    lastExt = ext;

    // Determine raw gesture mode + target scale
    let rawMode;
    if(ext === 0){
      rawMode='scale'; targetScale = 0.5;
    } else if(ext === 1){
      rawMode='heartbeat';
    } else if(ext === 2){
      rawMode='spin';
    } else if(ext === 3){
      rawMode='rspin';
    } else {
      rawMode='scale';
      targetScale = 0.8 + ext * 0.3;
    }

    if(rawMode === 'heartbeat' && aMode !== 'heartbeat'){
      heartbeatBase = curScale;
    }
    aMode = rawMode;

    // Always update attractor to current hand position
    if(pinch){
      const px = (lm[4].x + lm[8].x) / 2;
      const py = (lm[4].y + lm[8].y) / 2;
      attractor.copy(ndc2world(px, py));
    } else {
      const palmPts = [0, 5, 9, 13, 17];
      let cx=0, cy=0;
      for(const idx of palmPts){ cx+=lm[idx].x; cy+=lm[idx].y; }
      cx/=palmPts.length; cy/=palmPts.length;
      attractor.copy(ndc2world(cx, cy));
    }

    // Skeleton preview
    skelCv.width=160; skelCv.height=120;
    skCtx.clearRect(0,0,160,120);
    const sx=160,sy=120,sc=.72,ox=(1-sc)*sx/2,oy=(1-sc)*sy/2;
    skCtx.lineWidth=1.2; skCtx.shadowBlur=3;
    for(const[a,b]of SKEL_CONN){
      skCtx.beginPath();
      skCtx.moveTo(lm[a].x*sx*sc+ox, lm[a].y*sy*sc+oy);
      skCtx.lineTo(lm[b].x*sx*sc+ox, lm[b].y*sy*sc+oy);
      skCtx.strokeStyle='rgba(120,165,255,.55)'; skCtx.shadowColor='rgba(120,165,255,.4)';
      skCtx.stroke();
    }
    for(const p of lm){
      skCtx.beginPath(); skCtx.arc(p.x*sx*sc+ox, p.y*sy*sc+oy, 2, 0, Math.PI*2);
      skCtx.fillStyle='rgba(255,255,255,.75)'; skCtx.shadowColor='rgba(255,255,255,.5)';
      skCtx.fill();
    }
    skCtx.shadowBlur=0;
    skelCv.classList.add('on');
  } else {
    handLM = null;
    skelCv.classList.remove('on');
    if(!mDown) aMode='none';
    targetScale = 1.0;
  }
}

async function initHandTracking(){
  if(!mpAvailable || typeof Hands === 'undefined'){
    console.warn('手势库未加载，仅支持鼠标交互');
    return;
  }
  try {

    const hands = new Hands({
      locateFile: file => cdnOK
        ? `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
        : `./libs/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.5,
    });

    hands.onResults(onHandResults);

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:640}, height:{ideal:480}, facingMode:'user' }
    });
    video.srcObject = stream;
    await video.play();

    // Camera util: automatically sends every frame to hands.send()
    const mpCam = new Camera(video, {
      onFrame: async () => { await hands.send({image: video}); },
      width: 640,
      height: 480,
    });
    await mpCam.start();

    mpReady = true;

  } catch(e){
    console.warn('手势初始化失败:', e.message);
  }
}

/* ══════ UPDATE ══════ */
function updateParticles(dt){
  for(let i=0;i<P.length;i++){
    const p=P[i];

    // ── Spring force: pull toward shape target ──
    if(aMode==='heartbeat'){
      // During heartbeat: fast direct lerp so the pulse is visible
      p.x += (p.tx - p.x) * 0.25;
      p.y += (p.ty - p.y) * 0.25;
      p.z += (p.tz - p.z) * 0.25;
      p.vx = 0; p.vy = 0; p.vz = 0;
    } else {
      const sk = 2.0;
      if(curShape!=='scatter'){
        p.vx += (p.tx - p.x) * sk * dt;
        p.vy += (p.ty - p.y) * sk * dt;
        p.vz += (p.tz - p.z) * sk * dt;
      }
    }

    // ── Damping (uniform, moderate) ──
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.vz *= 0.97;

    // ── Integrate ──
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.z += p.vz * dt;

    // ── Soft boundary: prevent escape ──
    const r = Math.sqrt(p.x*p.x + p.y*p.y + p.z*p.z);
    const bnd = aMode==='repel' ? 12 : 7;
    if(r > bnd){
      const bounce = 0.6;
      p.x = (p.x/r) * bnd;
      p.y = (p.y/r) * bnd;
      p.z = (p.z/r) * bnd;
      const dot = (p.vx*(p.x/r) + p.vy*(p.y/r) + p.vz*(p.z/r));
      if(dot > 0){
        p.vx -= 2 * dot * (p.x/r) * bounce;
        p.vy -= 2 * dot * (p.y/r) * bounce;
        p.vz -= 2 * dot * (p.z/r) * bounce;
      }
    }

    const j = i * 3;
    posA[j]=p.x; posA[j+1]=p.y; posA[j+2]=p.z;
    colA[j]=p.color.r; colA[j+1]=p.color.g; colA[j+2]=p.color.b;
    sizA[i]=p.size;
  }
  geo.setDrawRange(0, P.length);
  geo.attributes.position.needsUpdate = true;
  geo.attributes.color.needsUpdate = true;
  geo.attributes.size.needsUpdate = true;
}

/* ══════ ANIMATE ══════ */
let lastT=performance.now();
function animate(t){
  requestAnimationFrame(animate);
  const dt=Math.min((t-lastT)/1000,.1); lastT=t;

  // Heartbeat: strong visible pulse, always based around scale 1.0
  if(aMode==='heartbeat'){
    const cycle = (performance.now() / 600) % 1;
    let pulse;
    if(cycle < 0.1) pulse = Math.sin(cycle / 0.1 * Math.PI);
    else if(cycle < 0.2) pulse = 0;
    else if(cycle < 0.3) pulse = Math.sin((cycle-0.2) / 0.1 * Math.PI) * 0.7;
    else pulse = -0.2;
    targetScale = 1.0 + pulse * 0.8;
  }

  const scaleSpeed = aMode==='heartbeat' ? 14 : 4;
  curScale += (targetScale - curScale) * scaleSpeed * dt;
  curScale = Math.max(0.4, Math.min(2.0, curScale));

  // Scale controls camera distance: small scale = far away, big scale = close up
  const scaleZoom = 6.0 / curScale;
  updateParticles(dt);

  rotY+=(tRotY-rotY)*4*dt; rotX+=(tRotX-rotX)*4*dt; zoom+=(scaleZoom-zoom)*3*dt;

  if(curShape==='text'){
    // Text: always face front, snap back to 0
    tRotY += (0 - tRotY) * 5 * dt;
    // Clamp vertical rotation to small tilt only
    tRotX += (0.25 - tRotX) * 5 * dt;
    // Spin/rspin: rotate all tx/ty targets around origin
    if(aMode==='spin' || aMode==='rspin'){
      const angle = (aMode==='spin' ? 2.5 : -2.5) * dt;
      const c = Math.cos(angle), s = Math.sin(angle);
      for(const p of P){
        const nx = p.tx*c - p.ty*s;
        const ny = p.tx*s + p.ty*c;
        p.tx = nx; p.ty = ny;
      }
    }
  } else {
    if(!mDown&&!handLM) tRotY+=dt*.12;
    if(aMode==='spin') tRotY+=dt*2.5;
    if(aMode==='rspin') tRotY-=dt*2.5;
  }

  // Heart + heartbeat: smoothly swing camera back to front view
  if(curShape==='heart' && aMode==='heartbeat'){
    // Normalize tRotY to nearest multiple of 2π (front face)
    const fullTurns = Math.round(tRotY / (Math.PI * 2));
    const frontY = fullTurns * Math.PI * 2;
    tRotY += (frontY - tRotY) * 5 * dt;
    tRotX += (0.25 - tRotX) * 5 * dt; // default slight tilt
  }

  cam3d.position.set(Math.sin(rotY)*Math.cos(rotX)*zoom, Math.sin(rotX)*zoom, Math.cos(rotY)*Math.cos(rotX)*zoom);
  cam3d.lookAt(0,0,0);
  starMesh.rotation.y+=dt*.025;
  if(composer) composer.render();
  else renderer.render(scene,cam3d);

  statEl.textContent=`${P.length} 粒子 · ${mpReady?'手势':'鼠标'} · ext:${lastExt} · ${aMode} · scale:${curScale.toFixed(2)} · ${Math.round(1/Math.max(dt,.001))} fps`;
}

/* ══════ RESIZE ══════ */
window.addEventListener('resize',()=>{
  renderer.setSize(W(),H()); cam3d.aspect=W()/H(); cam3d.updateProjectionMatrix();
  if(composer) composer.setSize(W(),H());
});

/* ══════ BOOT ══════ */
animate(performance.now());
initHandTracking();
</script>
</body>
</html>
